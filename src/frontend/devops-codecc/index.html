<!DOCTYPE html>
<html>
  <head>
    <!-- <meta http-equiv="Pragma" content="no-cache" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" href="__BK_PUBLIC_PATH_PREFIX__/static/images/favicon.ico" type="image/x-icon" />
    <link
      rel="shortcut icon"
      href="__BK_PUBLIC_PATH_PREFIX__/static/images/favicon.ico"
      type="image/x-icon"
    />
    <meta charset="utf-8" />
    <title>CodeCC</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      function normalizeBasePath(value) {
        var path = (value || '').trim();
        if (!path || path.indexOf('__') === 0) {
          return '/';
        }
        if (path.charAt(0) !== '/') {
          path = '/' + path;
        }
        path = path.replace(/\/+/g, '/');
        if (path.charAt(path.length - 1) !== '/') {
          path += '/';
        }
        return path;
      }

      function normalizeAssetBase(value, fallback) {
        var base = (value || '').trim();
        if (!base || base.indexOf('__') === 0) {
          return normalizeBasePath(fallback);
        }
        if (/^(https?:)?\/\//.test(base)) {
          return base.charAt(base.length - 1) === '/' ? base : base + '/';
        }
        return normalizeBasePath(base);
      }

      function joinUrl(base, path) {
        var baseValue = String(base || '/');
        var pathValue = String(path || '');
        if (/^(https?:)?\/\//.test(pathValue)) {
          return pathValue;
        }
        if (/^https?:\/\//.test(baseValue)) {
          var url = new URL(baseValue);
          url.pathname = [url.pathname, pathValue].join('/').replace(/\/+/g, '/');
          return url.toString().replace(/\/$/, pathValue ? '' : '/');
        }
        if (baseValue.indexOf('//') === 0) {
          return [baseValue.replace(/\/+$/, ''), pathValue.replace(/^\/+/, '')]
            .filter(function (item) { return item !== ''; })
            .join('/');
        }
        var startsWithRoot = baseValue.indexOf('/') === 0;
        var joined = [baseValue, pathValue]
          .filter(function (item) { return item !== ''; })
          .join('/')
          .replace(/\/+/g, '/');
        return startsWithRoot ? '/' + joined.replace(/^\/+/, '') : joined;
      }

      var BK_SITE_PATH = normalizeBasePath('<%= process.env.BK_SITE_PATH %>');
      var PAAS_SERVICE_URL = '<%= process.env.BK_PAAS_SERVICE_URL %>';
      var AJAX_URL_PREFIX =
        '<%= process.env.NODE_ENV %>' === 'development'
          ? '<%= process.env.BK_AJAX_URL_PREFIX %>'
          : '//' + location.host + '/ms';
      var OP_AJAX_URL_PREFIX = '<%= process.env.BK_CODECC_OP_SITE_URL %>';
      var DEVOPS_SITE_URL = '<%= process.env.BK_DEVOPS_SITE_URL %>';
      var DEVOPS_API_URL = DEVOPS_SITE_URL + '/ms';
      var STREAM_SITE_URL = '<%= process.env.BK_STREAM_SITE_URL %>';
      var PRECI_URL = '<%= process.env.BK_PRECI_URL %>';
      var USER_API_URL = '<%= process.env.BK_USER_API_URL %>';
      var PAAS_V3_URL = '<%= process.env.BK_PAAS_V3_URL %>';
      var PAAS_V3_APP = '<%= process.env.BK_PAAS_V3_APP %>';
      // 链接
      var IWIKI_SITE_URL = '<%= process.env.BK_IWIKI_SITE_URL %>';
      var IWIKI_CODECC_HOME = IWIKI_SITE_URL + '/15107691';
      var IWIKI_CODECC_TOOL = IWIKI_SITE_URL + '/15107684';
      var IWIKI_MRPR_SCAN = IWIKI_SITE_URL + '/219399148';
      var IWIKI_PROHIBIT = IWIKI_SITE_URL + '/881538122';
      var IWIKI_OPEN_SCORE = IWIKI_SITE_URL + '/1756231675';
      var IWIKI_ROBOT_DESC = IWIKI_SITE_URL + '/79242724';
      var DOWNLOAD_JD_PRECI_URL = IWIKI_SITE_URL + '/188803999';
      var DOWNLOAD_VS_PRECI_URL = IWIKI_SITE_URL + '/188803879';
      var PRECI_INIT_PROJECT_URL = IWIKI_SITE_URL + '/4008544941'

      var TECHMAP_REPORT = '<%= process.env.BK_TECHMAP_REPORT %>';
      var BK_IAM_URL_PREFIX = '<%= process.env.BK_IAM_URL_PREFIX %>';
      var BK_API_TENANT_BASE_URL = '<%= process.env.BK_API_TENANT_BASE_URL %>';

      // aegis监控
      // var AEGISID = '<%= process.env.BK_AEGISID %>';

      var BK_STATIC_URL = normalizeAssetBase('<%= process.env.BK_STATIC_URL %>', BK_SITE_PATH)
      window.BK_SITE_PATH = BK_SITE_PATH
      window.BK_STATIC_URL = BK_STATIC_URL
      window.__loadAssetsUrl__ = function (src) {
        return joinUrl(window.BK_STATIC_URL || '/', src);
      }
      var IS_ENV_TAI = Boolean(location.host === '<%= process.env.BK_CODECC_HOST_TAI_URL %>')

      // 太湖环境
      if (IS_ENV_TAI) {
        DEVOPS_SITE_URL = '<%= process.env.BK_DEVOPS_SITE_TAI_URL %>';
        DEVOPS_API_URL = DEVOPS_SITE_URL + '/ms';
        PAAS_SERVICE_URL = '<%= process.env.BK_PAAS_SERVICE_TAI_URL %>';
      }
    </script>
    <script>
      (function () {
        if (window.self !== window.top) {
          // iframe嵌入
          var ciPublicPathPrefix = '__BK_CI_PUBLIC_PATH_PREFIX__';
          var prefix = ciPublicPathPrefix && ciPublicPathPrefix.indexOf('__') !== 0
            ? ciPublicPathPrefix
            : DEVOPS_SITE_URL;
          var script = document.createElement('script');
          script.type = 'text/javascript';
          script.src = prefix + '/console/static/devops-utils.js';
          document.getElementsByTagName('head')[0].appendChild(script);
        }
        if ('<%= process.env.NODE_ENV %>' !== 'development') {
          var sitePath = window.BK_SITE_PATH || '/';
          var pathWithoutSitePath = document.location.pathname;
          if (sitePath !== '/' && pathWithoutSitePath.indexOf(sitePath) === 0) {
            pathWithoutSitePath = '/' + pathWithoutSitePath.slice(sitePath.length);
          }
          var projectId =
            pathWithoutSitePath.match(/^\/codecc\/([\w._-]+)\/?/)?.[1] ||
            document.location.search.match(/projectId=([\w._-]+)/)?.[1] || '';
          var projectIdInCookie = document.cookie.replace(
            /(?:(?:^|.*;\s*)X-DEVOPS-PROJECT-ID\s*\=\s*([^;]*).*$)|^.*$/,
            '$1'
          );
          if (projectId !== projectIdInCookie) {
            document.cookie =
              'X-DEVOPS-PROJECT-ID=' +
              projectId +
              ';domain=' +
              location.host +
              ';path=' +
              (window.BK_SITE_PATH || '/');
            document.location.reload();
          }
        }
      })();
    </script>
  </body>
</html>
